const horrorAudio=document.getElementById('horrorAudio'),heartbeat=document.getElementById('heartbeat');
let recentEffects=[],pupilEl=null;

function playSound(audio=horrorAudio){audio.currentTime=0;audio.play().catch(()=>{});}
function getProbability(){if(currentStep<5)return 0;const start=5,end=30;return Math.min(0.5+((currentStep-start)/(end-start))*0.5,1);}

// 25种特效（去掉关机，保留24种，补充一个“选项颤抖”）
const horrorEffects=[
  {id:'invert',fn:()=>{document.body.classList.add('invert');setTimeout(()=>document.body.classList.remove('invert'),200)}},
  {id:'flash',fn:()=>{document.body.classList.add('flash');setTimeout(()=>document.body.classList.remove('flash'),250)}},
  {id:'artifact',fn:()=>{glitchLayer.style.display='block';setTimeout(()=>glitchLayer.style.display='none',250)}},
  {id:'distort',fn:()=>{document.body.classList.add('distort');setTimeout(()=>document.body.classList.remove('distort'),300)}},
  {id:'dark',fn:()=>{document.body.style.background='#110000';setTimeout(()=>document.body.style.background='',500)}},
  {id:'invertText',fn:invertRandomText},{id:'shakeText',fn:shakeRandomText},{id:'corrupt',fn:corruptQuestionText},
  {id:'float',fn:()=>showFloatingTerror(['我看见你了','你在说谎','逃吧','别回头','他都知道了','救救我','好疼','融为一体'][Math.floor(Math.random()*8)])},
  {id:'eye',fn:showPeekingEye},
  {id:'bigEye',fn:()=>{let e=document.createElement('div');e.className='hidden-terror';e.textContent='👁️';e.style.fontSize='8rem';e.style.top='40%';e.style.left='45%';document.body.appendChild(e);setTimeout(()=>e.remove(),800)}},
  {id:'sysWarn',fn:()=>showSysError(['摄像头已启动','麦克风正在录音','位置已锁定','数据上传中...','警告：异常人格特征','不要回头','自毁倒计时'][Math.floor(Math.random()*7)])},
  {id:'bsod',fn:()=>{bsod.classList.add('active');setTimeout(()=>bsod.classList.remove('active'),1200)}},
  {id:'bloody',fn:()=>{document.querySelectorAll('.option-btn').forEach(b=>b.classList.add('bloody'));setTimeout(()=>document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('bloody')),400)}},
  {id:'vignette',fn:()=>{document.body.style.boxShadow='inset 0 0 150px red';setTimeout(()=>document.body.style.boxShadow='',600)}},
  {id:'shakeScreen',fn:()=>{document.body.style.transform='translate(4px,0)';setTimeout(()=>document.body.style.transform='',100)}},
  {id:'redTextPop',fn:()=>{let el=document.createElement('div');el.style.cssText='position:fixed;top:20%;left:50%;transform:translate(-50%);font-size:4rem;color:red;font-family:Creepy,cursive;z-index:10030;pointer-events:none;animation:fadeInOut 1.5s forwards';el.textContent='看着我';document.body.appendChild(el);setTimeout(()=>el.remove(),1500)}},
  {id:'textDissolve',fn:()=>{let qt=document.querySelector('.question-text');if(qt){qt.style.transition='opacity 2s';qt.style.opacity='0';setTimeout(()=>{qt.style.opacity='1'},1500)}}},
  {id:'optionSwap',fn:()=>{let btns=document.querySelectorAll('.option-btn');if(btns.length>1){let orig=btns[0].textContent;btns[0].textContent='别选这个';setTimeout(()=>{btns[0].textContent=orig},1000)}}},
  {id:'fakeProgress',fn:()=>{let bar=document.createElement('div');bar.style.cssText='position:fixed;top:10px;left:50%;transform:translate(-50%);width:80%;height:10px;background:red;z-index:10050;animation:progressBar 2s forwards';document.body.appendChild(bar);setTimeout(()=>bar.remove(),2200)}},
  {id:'heartbeat',fn:()=>{playSound(heartbeat);let el=document.createElement('div');el.textContent='💓';el.style.cssText='position:fixed;bottom:20px;right:20px;font-size:3rem;animation:pulse .5s infinite';document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}},
  {id:'staticNoise',fn:()=>{glitchLayer.style.display='block';playSound(horrorAudio);setTimeout(()=>glitchLayer.style.display='none',500)}},
  {id:'pupilFollow',fn:()=>{if(!pupilEl){pupilEl=document.createElement('div');pupilEl.className='pupil';pupilEl.textContent='👁️';document.body.appendChild(pupilEl)}document.addEventListener('mousemove',followMouse);setTimeout(()=>{document.removeEventListener('mousemove',followMouse);if(pupilEl)pupilEl.remove();pupilEl=null},4000)}},
  {id:'whisper',fn:()=>{let txts=['你听到了吗','好吵','闭嘴'];let el=document.createElement('div');el.className='hidden-terror';el.textContent=txts[Math.floor(Math.random()*3)];el.style.fontSize='1.2rem';el.style.bottom='10%';el.style.left='10%';document.body.appendChild(el);setTimeout(()=>el.remove(),1200)}},
  {id:'reverseScroll',fn:()=>{window.scrollBy(0,50);setTimeout(()=>window.scrollBy(0,-50),200)}},
  {id:'btnShake',fn:()=>{let btns=document.querySelectorAll('.option-btn');if(btns.length){btns[Math.floor(Math.random()*btns.length)].classList.add('text-shake');setTimeout(()=>document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('text-shake')),500)}}}
];

function followMouse(e){if(pupilEl){pupilEl.style.left=e.clientX+'px';pupilEl.style.top=e.clientY+'px';}}

function getRandomEffect(){
  let pool=horrorEffects.filter(e=>!recentEffects.includes(e.id));
  if(pool.length<6) pool=horrorEffects; // 若可选太少则全部解禁
  let chosen=pool[Math.floor(Math.random()*pool.length)];
  recentEffects.push(chosen.id);
  if(recentEffects.length>12) recentEffects.shift(); // 保留最近12个，降低重复
  return chosen.fn;
}

function triggerRandomHorror(){
  let prob=getProbability();
  if(Math.random()<prob){
    let count=1+Math.floor(Math.random()*(prob<0.8?2:3));
    for(let i=0;i<count;i++){
      let fn=getRandomEffect();
      try{fn();}catch(e){}
      if(Math.random()<0.4) playSound(horrorAudio);
    }
  }
}

function showPeekingEye(){
  let eye=document.createElement('div');eye.className='peek-eye';eye.textContent='👁️';
  eye.style.top=Math.random()*80+'%';eye.style.left=Math.random()*80+'%';
  document.body.appendChild(eye);setTimeout(()=>eye.remove(),1200);
}

function invertRandomText(){
  const texts=document.querySelectorAll('.question-text,.option-btn');
  if(texts.length===0)return;
  let el=texts[Math.floor(Math.random()*texts.length)];
  let orig=el.innerHTML,words=orig.split(' ');if(!words.length)return;
  let idx=Math.floor(Math.random()*words.length);
  words[idx]=`<span class="text-inverted">${words[idx]}</span>`;
  el.innerHTML=words.join(' ');
  setTimeout(()=>{el.innerHTML=orig},800);
}

function shakeRandomText(){
  const texts=document.querySelectorAll('.question-text,.option-btn');
  if(texts.length===0)return;
  let el=texts[Math.floor(Math.random()*texts.length)];
  el.classList.add('text-shake');setTimeout(()=>el.classList.remove('text-shake'),500);
}

function corruptQuestionText(){
  const qt=document.querySelector('.question-text');
  if(!qt)return;qt.classList.add('corrupt');setTimeout(()=>qt.classList.remove('corrupt'),400);
}

function showSysError(msg){
  sysDialogMsg.textContent=msg;sysDialog.style.display='block';
  setTimeout(()=>{if(sysDialog.style.display==='block')sysDialog.style.display='none'},2000);
}

window.closeSysDialog=function(){sysDialog.style.display='none';};

function showFloatingTerror(text){
  let el=document.createElement('div');el.className='hidden-terror';
  el.textContent=text;el.style.top=(15+Math.random()*70)+'%';el.style.left=(10+Math.random()*80)+'%';
  document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
}

// 原有逻辑保持不变，但去掉了假关机，精简了部分回调
function startQuiz(){
  startPage.classList.add('hidden');
  setTimeout(()=>{startPage.style.display='none';quizContainer.classList.add('visible');showQuestion(0)},400);
}

function showQuestion(index){
  resetEffects();if(index>=31){showResult();return;}
  currentStep=index;
  const q=questions[index];
  let html=`<div class="question-text">${q.text}</div>`;
  q.answers.forEach((ans,i)=>{html+=`<button class="option-btn" onclick="handleAnswer(${index},${i})">${ans.text}</button>`});
  app.innerHTML=html;
  if(q.special==='glitchPopup')addRedPopups();
  if(q.terrorHint)setTimeout(()=>showFloatingTerror(q.terrorHint),800);
  triggerRandomHorror();
  if(currentStep>=5&&Math.random()<0.6)setTimeout(triggerRandomHorror,600);
}

function resetEffects(){
  document.body.classList.remove('invert','flash','distort');document.body.style.background='';
  glitchLayer.style.display='none';
  document.querySelectorAll('.why-flood,.bounce-img,.zoom-in-img,.danmaku,.hidden-terror,.red-popup-bg,.peek-eye').forEach(e=>e.remove());
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('bloody','text-shake'));
}

function addRedPopups(){
  const bg=document.createElement('div');bg.className='red-popup-bg';
  const msgs=['正常？','不对劲','哈哈','测试','监视','谁在看','说谎','我不正常','救命','逃','你有罪','认命','疼'];
  for(let i=0;i<15;i++){
    let popup=document.createElement('div');popup.className='red-popup';
    popup.textContent=msgs[i%msgs.length];
    popup.style.top=(5+Math.random()*80)+'%';popup.style.left=(2+Math.random()*90)+'%';
    popup.style.animationDelay=Math.random()*2+'s';
    bg.appendChild(popup);
  }
  quizContainer.appendChild(bg);
}

function handleAnswer(qIndex,aIndex){
  const q=questions[qIndex],ans=q.answers[aIndex];
  if(qIndex===30){handleQ31(ans,aIndex);return;}
  if(ans.animal)animalScores[ans.animal]=(animalScores[ans.animal]||0)+1;
  triggerRandomHorror();
  applyPostAnswerEffect(qIndex,ans);
  if(qIndex===19){showCallOverlay(()=>{currentStep++;showQuestion(currentStep)});}
  else if(qIndex===22){showRedModal(()=>{currentStep++;showQuestion(currentStep)});}
  else if(qIndex===25){showDanmaku('我也这么觉得',()=>{currentStep++;showQuestion(currentStep)});}
  else{currentStep++;showQuestion(currentStep);}
}

function applyPostAnswerEffect(qIndex,ans){
  if(qIndex===13&&ans.animal==='虎鲸'){setTimeout(()=>showFloatingTerror('你知道得太多了'),500);}
  if(qIndex===20&&ans.text.includes('不确定')){setTimeout(()=>showFloatingTerror('我在看着你'),800);}
  if(qIndex===21&&ans.text.includes('我也在')){showPeekingEye();showSysError('摄像头权限已被获取。');playSound();}
  if(qIndex===29&&(ans.text.includes('退路')||ans.text.includes('圆满'))){
    document.body.style.background='#1a0000';setTimeout(()=>document.body.style.background='',400);
    showFloatingTerror('你确定吗？');showSysError('自毁倾向警告。');
    bsod.classList.add('active');setTimeout(()=>bsod.classList.remove('active'),1000);
  }
  if(qIndex===7&&ans.animal==='蛇'){setTimeout(()=>showFloatingTerror('我会等你'),600);}
  if(qIndex===12&&ans.animal==='猫头鹰'){setTimeout(()=>{showSysError('私人空间已被扫描');playSound()},700);}
  if(qIndex===15&&ans.text.includes('小号测试')){setTimeout(()=>showFloatingTerror('真有趣'),500);}
  if(qIndex===24&&ans.text.includes('同一具身体')){document.body.style.background='#200';setTimeout(()=>document.body.style.background='',300);showFloatingTerror('融为一体');}
}

function showCallOverlay(cb){callOverlay.classList.add('active');
  document.getElementById('rejectBtn').onclick=()=>{callOverlay.classList.remove('active');cb();};
  document.getElementById('acceptBtn').onclick=()=>{callOverlay.classList.remove('active');fullscreenGlitch.classList.add('active');playSound();
    fullscreenGlitch.onclick=()=>{fullscreenGlitch.classList.remove('active');fullscreenGlitch.onclick=null;showSysError('通话已中断。对方仍在监听。');cb();}};
}

function showRedModal(cb){redModal.classList.add('active');
  modalRedText.onclick=()=>{redModal.classList.remove('active');let img=document.createElement('img');img.src='https://i.imgs.ovh/2026/06/29/9f8c54786f524bebd60100c68d2e571e.png';img.className='bounce-img';img.style.top='40%';img.style.left='35%';img.style.width='200px';document.body.appendChild(img);img.addEventListener('animationend',()=>{img.remove();cb();});};
}

function showDanmaku(text,cb){let d=document.createElement('div');d.className='danmaku';d.textContent=text;document.body.appendChild(d);d.addEventListener('animationend',()=>{d.remove();cb();});}

function handleQ31(ans,aIndex){
  if(ans.text==='愿意'){showResultImage();return;}
  if(!window.q31Count)window.q31Count=0;
  window.q31Count++;
  const btns=document.querySelectorAll('.option-btn'),yes=btns[0],no=btns[1];
  if(window.q31Count<5){
    no.style.transform=`scale(${Math.max(0.1,1-window.q31Count*0.22)})`;
    yes.style.transform=`scale(${1+window.q31Count*0.35})`;
    for(let i=0;i<30;i++){let s=document.createElement('div');s.textContent='为什么？';s.className='why-flood';s.style.top=Math.random()*90+'%';s.style.left=Math.random()*90+'%';s.style.fontSize=(2+Math.random()*3)+'rem';document.body.appendChild(s);setTimeout(()=>s.remove(),2000)}
    triggerRandomHorror();showSysError('选项冲突。');
  }else if(window.q31Count===5){
    document.body.style.background='#0a0000';quizContainer.style.background='#1a0000';quizContainer.style.color='#fff';
    no.style.display='none';yes.style.transform='scale(3)';yes.style.background='#b30000';yes.style.fontWeight='bold';
    for(let i=0;i<100;i++){let s=document.createElement('div');s.textContent='为什么？';s.className='why-flood';s.style.top=Math.random()*100+'%';s.style.left=Math.random()*100+'%';s.style.fontSize=(2+Math.random()*5)+'rem';document.body.appendChild(s);setTimeout(()=>s.remove(),3500)}
    document.body.classList.add('invert');setTimeout(()=>document.body.classList.remove('invert'),1200);
    showSysError('拒绝无效。请重新选择。');bsod.classList.add('active');setTimeout(()=>bsod.classList.remove('active'),1500);playSound();
    yes.onclick=()=>{showResultImage();};
    no.onclick=null;
  }
}

function showResultImage(){
  document.querySelectorAll('.why-flood').forEach(e=>e.remove());
  document.body.style.background='#000';quizContainer.style.display='none';
  let img=document.createElement('img');img.src='https://i.imgs.ovh/2026/06/29/ba19af475a2fb16588c94ac589c1c2c5.png';
  img.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);width:80%;max-width:400px;z-index:10010;cursor:pointer;transition:transform .3s';
  img.onclick=()=>{img.remove();quizContainer.style.display='block';document.body.style.background='';showResult();};
  document.body.appendChild(img);
  let scale=1;setInterval(()=>{scale=scale===1?1.07:1;img.style.transform=`translate(-50%,-50%) scale(${scale})`},600);
}

function showResult(){
  resetEffects();let maxAnimal='',maxScore=0;
  for(let[a,s]of Object.entries(animalScores)){if(s>maxScore){maxScore=s;maxAnimal=a}}
  if(!maxAnimal)maxAnimal='兔';
  let emoji=animalsEmoji[maxAnimal]||'❓';
  app.innerHTML=`<div style="font-size:2.5rem;margin-top:20px">你的恋爱动物是</div><div style="font-size:7rem;margin:20px 0">${emoji}</div><div style="font-size:3.5rem;font-weight:bold">${maxAnimal}</div><div style="font-size:1.5rem;margin-top:50px">感谢您参与测试，唐臣公寓期待您的入住</div><button class="option-btn" onclick="location.reload()" style="text-align:center">再测一次</button>`;
  quizContainer.style.background='#fff0f5';quizContainer.style.color='#d63384';quizContainer.style.display='block';document.body.style.background='#ffe6f0';
  if(Math.random()<0.8){setTimeout(showPeekingEye,1500);setTimeout(()=>showFloatingTerror('你以为结束了吗？'),3000);playSound();}
}

cornerImg.addEventListener('click',()=>{cornerClickCount++;
  if(cornerClickCount===1)cornerImg.src='https://i.imgs.ovh/2026/06/29/9f8c54786f524bebd60100c68d2e571e.png';
  else if(cornerClickCount>=4){
    if(!cornerImg.classList.contains('fullscreen')){cornerImg.src='https://i.imgs.ovh/2026/06/29/56f95bd15d1ae9d7edc0d29713f4b5e3.png';cornerImg.classList.add('fullscreen');cornerScale=1;}
    else{cornerScale+=0.5;cornerImg.style.transform=`scale(${cornerScale})`;if(cornerScale>=5){cornerImg.style.display='none';document.body.style.background='#000';}}
  }
});
</script></body></html>
